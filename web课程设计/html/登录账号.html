<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>账号注册</title>
		<link rel="icon" href=".././img/favicon.ico" type ="image/x-icon">
		<link rel="stylesheet" type="text/css" href="../css/账号.css"/>
		<script src="../css/验证.js"></script>
	</head>
	<body>
		<div class="allin">
		</div>
		<div class="all">
			<div class="img">
			</div>
			<h1>登录淘宝账号</h1>
			<div class="middle">
				<div style="display: block;">
				<label for="account">邮箱账号</label>
				<form method="post">
				<input class="input2" type="text" id="account" placeholder="请输入邮箱账号" /><input type="reset" class="reset button"><br />
				</form>
				<label for="password">密码</label>
				<form method="post">
				<input class="input2" type="password" id="password" placeholder="请输入密码" /><input type="reset" class="reset button"><br />
				</form>
				</div>
				<br/>
				<button class="input3" onclick="validateAccount()">立即登录</button>
			</div>
			<div class="radio">
				<input type="radio" checked="checked"/>
				<span class="gray">注册账号即表示您同意并愿意遵守<span class="mark">淘宝平台用户协议</span>和<span class="mark">隐私策略</span></span>
			</div>
			<div class="bottom">
				<ul>
					<li>简体</li>
					<li>|</li>
					<li>繁体</li>
					<li>|</li>
					<li>English</li>
					<li>|</li>
					<li>常见问题</li>
				</ul>
			</div>
		</div>
	</body>
</html>
